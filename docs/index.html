<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Document</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Description">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
</head>

<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      // ----- 基础信息 -----
      name: '我的知识库',     // 侧边栏/导航栏显示的标题，改成你自己的
      repo: '',              // 如果想在右上角显示GitHub链接，这里填仓库地址，否则留空
      loadSidebar: true,     // 【重要】开启侧边栏功能，设为 true 后，它会去找 _sidebar.md 文件
      auto2top: true,        // 切换页面时自动滚动到顶部

      // ----- 增强功能 (可选) -----
      subMaxLevel: 2,        // 网页内自动生成的目录，显示几级标题？1-6，建议2
      search: 'auto',        // 开启全局搜索，需要额外加载一个插件，先写上，后续我会说明
      copyCode: true,        // 给代码块添加“复制”按钮
      themeColor: '#42b983'  // 主题色，改成你喜欢的颜色代码
    }
  </script>
  <!-- Docsify v4 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.css">
</body>

</html>
